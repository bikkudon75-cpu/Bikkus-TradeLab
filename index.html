<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikku's TradeLab</title>
<link rel="stylesheet" href="style.css">
<script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<header>
  <h1>Bikku's TradeLab</h1>
  <p>Learn • Trade • Compete • Get Funded</p>
</header>

<div class="stats">
  <div>Balance: NPR <span id="balance">100000</span></div>
  <div>P/L: <span id="pl">0</span></div>
  <div>XP: <span id="xp">0</span></div>
  <div>Level: <span id="level">Beginner</span></div>
</div>

<div id="tvchart"></div>

<div class="controls">
  <button onclick="buy()">BUY</button>
  <button onclick="sell()">SELL</button>
</div>

<section>
  <h2>Funded Challenge</h2>
  <p>Target: +10%</p>
  <progress value="0" max="100" id="challenge"></progress>
</section>

<section>
  <h2>Game Mode</h2>
  <button onclick="dailyQuest()">Daily Quest</button>
  <button onclick="spinReward()">Spin Reward</button>
</section>

<section>
  <h2>Trade History</h2>
  <ul id="history"></ul>
</section>

<script src="script.js"></script>
</body>
</html>
