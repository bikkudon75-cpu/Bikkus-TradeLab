<!DOCTYPE html>
<html>
<head>
  <title>Bikku's TradeLab</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="center">

<div>
  <img src="logo.png" class="logo">
  <h1 class="title">Bikku's TradeLab</h1>
</div>

<div class="card">
  <h2>🔐 Sign Up</h2>

  <input id="username" placeholder="Enter Name">

  <button onclick="start()">Enter</button>
</div>

<script>
function start() {
  let name = document.getElementById("username").value;

  if (!name) {
    alert("Enter name!");
    return;
  }

  localStorage.setItem("user", name);

  document.body.innerHTML = "<h1 class='fade'>Welcome " + name + "</h1><p>Loading...</p>";

  setTimeout(() => {
    window.location.href = "game.html";
  }, 2000);
}
</script>
<script src="ads.js"></script>
</body>
</html>
